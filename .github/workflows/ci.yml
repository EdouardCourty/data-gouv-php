---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 160
              truthy: disable

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.4-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.4-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Regenerate client from spec
        run: composer generate

      - name: Assert generated code is up-to-date
        run: |
          if ! git diff --quiet src/DataGouv/Client src/DataGouv/Api src/DataGouv/DataGouvClient.php; then
            echo "❌ Generated code is out of date. Run 'composer generate' locally and commit the result."
            git diff --stat src/DataGouv/Client src/DataGouv/Api src/DataGouv/DataGouvClient.php
            exit 1
          fi
          echo "✅ Generated code is up-to-date."

      - name: Run PHPStan
        run: composer phpstan

      - name: Run PHP CS Fixer check
        run: composer cs-check

      - name: Run unit tests
        run: composer test-unit

      - name: Run integration tests
        run: composer test-integration
