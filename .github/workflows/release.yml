---
name: Release

'on':
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Bump minor version and release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch'
      || (
        github.event.pull_request.merged == true
        && startsWith(github.event.pull_request.head.ref, 'chore/spec-update-')
        && github.event.pull_request.user.login == 'github-actions[bot]'
        && github.event.pull_request.head.repo.full_name == github.repository
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
            LATEST_FOR_LOG=""
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            NEXT="v${MAJOR}.$((MINOR + 1)).0"
            LATEST_FOR_LOG="$LATEST"
          fi

          echo "current=$LATEST" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "latest_for_log=$LATEST_FOR_LOG" >> "$GITHUB_OUTPUT"
          echo "Releasing $NEXT (was $LATEST)"

      - name: Update CHANGELOG.md
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          LATEST_FOR_LOG="${{ steps.version.outputs.latest_for_log }}"
          DATE=$(date +%Y-%m-%d)

          if [ -n "$LATEST_FOR_LOG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${LATEST_FOR_LOG}..HEAD" | grep -v "^- chore: release" || true)
          else
            COMMITS=$(git log --pretty=format:"- %s" HEAD | grep -v "^- chore: release" || true)
          fi

          # Build new CHANGELOG entry in a temp file
          {
            echo "## [${NEXT}] - ${DATE}"
            echo ""
            echo "### Changes"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- Automated spec update from data.gouv.fr API"
            fi
            echo ""
          } > /tmp/new_entry.md

          # Prepend after the header block (first 6 lines) of CHANGELOG.md
          head -6 CHANGELOG.md > /tmp/changelog_new.md
          echo "" >> /tmp/changelog_new.md
          cat /tmp/new_entry.md >> /tmp/changelog_new.md
          tail -n +7 CHANGELOG.md >> /tmp/changelog_new.md
          mv /tmp/changelog_new.md CHANGELOG.md

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: release ${{ steps.version.outputs.next }}"
          git tag -a "${{ steps.version.outputs.next }}" -m "Release ${{ steps.version.outputs.next }}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.next }}
          name: ${{ steps.version.outputs.next }}
          generate_release_notes: true
